<ion-header class="auth-header">
  <ion-toolbar>
    <div class="logo-container">
      <img src="assets/icon/logo.png" alt="Logo" class="auth-logo" />
    </div>
  </ion-toolbar>
</ion-header>

<ion-content color="mccann-yellow">
  <ion-tabs #tabs>
    <!-- Login Tab Content -->
    <ion-tab tab="login">
      <div class="auth-container">
        <ion-card class="auth-card">
          <ion-card-header>
            <ion-card-title class="auth-title">
              <ion-icon name="log-in"></ion-icon>
              Login
            </ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()">
              <ion-item class="form-item">
                <!-- <ion-label position="floating">Email</ion-label> -->
                <ion-input
                  label="Email"
                  labelPlacement="floating"
                  type="email"
                  formControlName="email"
                  placeholder="Enter your email"
                ></ion-input>
              </ion-item>
              <div class="error-message" *ngIf="getFieldError(loginForm, 'email')">
                {{ getFieldError(loginForm, 'email') }}
              </div>

              <ion-item class="form-item">
                <ion-input
                  label="Password"
                  labelPlacement="floating"
                  type="password"
                  formControlName="password"
                  placeholder="Enter your password"
                ></ion-input>
              </ion-item>
              <div class="error-message" *ngIf="getFieldError(loginForm, 'password')">
                {{ getFieldError(loginForm, 'password') }}
              </div>

              <div class="error-message" *ngIf="loginError">
                {{ loginError }}
              </div>

              <ion-button
                expand="block"
                type="submit"
                class="submit-button"
                [disabled]="loginForm.invalid || loginLoading"
              >
                <span *ngIf="!loginLoading">Login</span>
                <ion-spinner *ngIf="loginLoading" name="crescent"></ion-spinner>
              </ion-button>
            </form>
          </ion-card-content>
        </ion-card>
      </div>
    </ion-tab>
